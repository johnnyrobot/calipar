services:
  calipar-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: calipar-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ${FIREBASE_CREDENTIALS_PATH:-./config/firebase-service-account.json}:/app/serviceAccountKey.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - proxy

  calipar-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
        - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}
    container_name: calipar-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - proxy

# NOTE: services join the external `proxy` network but declare NO routing labels
# (Traefik/nginx-proxy/etc.) and publish no ports. The reverse proxy that terminates
# TLS and routes the app + api hostnames to `calipar-frontend`/`calipar-backend` must be
# configured outside this file. If the proxy relies on per-service labels, add them here,
# otherwise these containers will be unreachable.
networks:
  proxy:
    external: true
