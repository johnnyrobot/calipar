name: CI

# Auto-runs are paused: GitHub Actions billing is currently unavailable for this
# account, so push/PR runs only fail to start (showing a red ✗). The job
# definitions below are kept intact and can still be launched manually from the
# Actions tab. To restore automatic CI once billing is active, re-enable the
# pull_request / push triggers below.
on:
  workflow_dispatch:
  # pull_request:
  # push:
  #   branches: [main]

jobs:
  frontend:
    name: Frontend (tsc · lint · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend (pytest smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./ci.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest -q

  docker:
    name: Docker prod images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend prod image
        run: docker build -f backend/Dockerfile.prod -t calipar-backend:ci backend
      - name: Build frontend prod image
        run: docker build -f frontend/Dockerfile.prod -t calipar-frontend:ci frontend
